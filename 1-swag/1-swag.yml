# 1-swag
# swag wirft nen s6-sc error aber läuft dann. joa das nervt aber es geht. solange er da keine weitere probleme macht lass ich uptime-kuma jetzt drin

services:
  swag:
    container_name: swag
    image: lscr.io/linuxserver/swag:5.4.0-ls447
    cap_add:
      - NET_ADMIN
    volumes:
      - ./config:/config
      - ./keys:/config/keys
      - ./cloudflare.ini:/config/dns-conf/cloudflare.ini
      - ./letsencrypt:/config/etc/letsencrypt
      - ./custom-proxies:/config/nginx/custom-proxies
      - ./custom-cont-init.d:/custom-cont-init.d:ro
    env_file: 1-swag.env
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      EMAIL: ${EMAIL}
      URL: ${URL}
      SUBDOMAINS: wildcard
      VALIDATION: dns
      DNSPLUGIN: cloudflare
      PROPAGATION: 120
      STAGING: false
      LOGS_TO_STDOUT: "/config/log/nginx/error.log"  # universal-stdout-logs Works pretty good
      DOCKER_HOST: tcp://dockerproxy:2375
      DOCKER_MODS: linuxserver/mods:swag-dashboard|linuxserver/mods:universal-stdout-logs|linuxserver/mods:universal-docker|linuxserver/mods:swag-auto-proxy|linuxserver/mods:swag-auto-uptime-kuma
    ports:
      - 80:80
      - 443:443
    restart: always
    networks:
      dockerproxy:
      swag:
    healthcheck:
      test: "curl -f http://localhost"
      interval: "29s"
      timeout: "5s"
      retries: 3
      start_period: "21s"
    logging:
      options:
        max-size: "200K"
        max-file: "10"
    depends_on:
      uptime-kuma:
        condition: service_healthy

  uptime-kuma:
    container_name: uptime-kuma
    image: dhi.io/uptime-kuma:2
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
    volumes:
      - ./rdap-dns.json:/app/extra/rdap-dns.json:ro
      - ./uptime-kuma_data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "setTimeout(()=>require('http').get('http://localhost:3001/api/entry-page',r=>{let d='';r.on('data',c=>d+=c);r.on('end',()=>{try{JSON.parse(d);process.exit(r.statusCode<400?0:1)}catch(e){process.exit(1)}})}).on('error',()=>process.exit(1)),5000)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      swag: enable
      swag_auth: authelia
      swag.uptime-kuma.enabled: true
      swag.uptime-kuma.monitor.url: http://uptime-kuma:3001/
    networks:
      swag:
      dockerproxy:

networks:
  swag:
    external: true
  dockerproxy:
    external: true
