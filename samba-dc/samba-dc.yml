# samba-dc
#

services:
  samba-dc:
    image: instantlinux/samba-dc:latest
    container_name: samba-dc
    hostname: samba-dc
    env_file: samba-dc.env
    environment:
      DOMAIN_TITLE: ${DOMAIN_TITLE}
      REALM: ${REALM}
      DNS_FORWARDER: ${DNS_FORWARDER}
      ADMIN_PASSWORD_SECRET: ${ADMIN_PASSWORD_SECRET}
      SAMBA_OPTIONS: "--interfaces=lo,eth0 --bind-interfaces-only=no"
      NTP_SERVER: 192.168.178.1
    cap_add:
      - SYS_ADMIN
    networks:
      macvlan0:
        ipv4_address: 192.168.178.242 # Dedicated IP
        mac_address: 36:80:64:03:ec:8f
    volumes:
      - ./lib_samba:/var/lib/samba
      - ./etc_samba:/etc/samba
      - ../1-swag/letsencrypt:/letsencrypt:ro
    restart: always
    secrets:
      - samba_admin_pass
    # seem to be critical...
    dns:
      - 127.0.0.1
    extra_hosts:
      - "samba-dc:127.0.0.1"
      - "samba-dc.domain.org:127.0.0.1"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "nc -z localhost 53 && nc -z localhost 389 && nc -z localhost 445 && nc -z localhost 636",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  macvlan0:
    external: true

secrets:
  samba_admin_pass:
    file: ./samba_admin_pass
