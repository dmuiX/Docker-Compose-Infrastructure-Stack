# Generated by entrypoint.sh. Add customizations under /etc/samba/conf.d.
#  DO NOT EDIT THIS FILE.

[global]
	netbios name = SAMBA-DC
	realm = DOMAIN.ORG
	server role = active directory domain controller
	server string = Samba Domain Controller
	workgroup = AD

	add machine script = /usr/sbin/adduser -D -H -G users -s /bin/false %u
	allow dns updates = secure
	bind interfaces only = yes
	domain logons = yes
	domain master = no
	interfaces = lo eth0
	log level = 1
	winbind refresh tickets = Yes
	winbind use default domain = yes
	dns forwarder = 192.168.178.253
include = /etc/samba/conf.d/netlogon.conf
include = /etc/samba/conf.d/samba-hardening.conf
include = /etc/samba/conf.d/sysvol.conf
