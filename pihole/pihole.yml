# pihole
#

services:
  pihole:
    container_name: pihole
    image: jacklul/pihole:dev
    env_file: pihole.env
    environment:
      TZ: ${TZ}
      PIHOLE_UID: ${PUID}
      PIHOLE_GID: ${PGID}

      FTLCONF_webserver_port: ${FTLCONF_webserver_port}
      FTLCONF_webserver_domain: ${FTLCONF_webserver_domain}
      FTLCONF_debug_api: true

      FTLCONF_dns_revServers: ${FTLCONF_dns_revServers}
      FTLCONF_dns_upstreams: ${FTLCONF_dns_upstreams}
      FTLCONF_dns_dnssec: false

      FTLCONF_misc_etc_dnsmasq_d: true
      FTLCONF_misc_privacylevel: 3

      PH_VERBOSE: 1
      HOSTNAME: ${HOSTNAME}

      REGEX_BLACKLIST_URL: https://raw.githubusercontent.com/mmotti/pihole-regex/master/regex.list
      BLOCKLISTS_URL: https://v.firebog.net/hosts/lists.php?type=tick
      WHITELIST_URL: https://raw.githubusercontent.com/anudeepND/whitelist/master/domains/whitelist.txt
    volumes:
      - ./etc-pihole:/etc/pihole:rw
      - ./05-samba-dc.conf:/etc/dnsmasq.d/05-samba-dc.conf
    restart: always
    hostname: pihole
    networks:
      macvlan0:
        ipv4_address: 192.168.178.253 # adjust the IP address as needed; this is the IP to reach ioBroker
        mac_address: 46:65:3b:1a:9f:b5
      swag:
      pihole:
        #ipv4_address: 172.24.0.2
    labels:
      swag: enable
      swag.uptime-kuma.enabled: true
      swag.uptime-kuma.monitor.url: http://pihole:80/
    logging:
      options:
        max-size: "200K"
        max-file: "10"

  unbound:
    container_name: pihole_unbound
    image: madnuttah/unbound:latest
    hostname: unbound
    restart: always
    environment:
      TZ: ${TZ}
      UNBOUND_UID: ${PUID}
      UNBOUND_GID: ${PGID}
      HEALTHCHECK_PORT: 5335
    ports:
      - 5335/tcp
      - 5335/udp
    networks:
      pihole:
        #ipv4_address: 172.24.0.3
    healthcheck:
      test: /usr/local/unbound/sbin/healthcheck.sh
      interval: 60s
      retries: 5
      start_period: 15s
      timeout: 30s
    logging:
      options:
        max-size: "200K"
        max-file: "10"

networks:
  macvlan0:
    external: true
  swag:
    external: true
  pihole:
    external: true

