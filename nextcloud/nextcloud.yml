services:
  nextcloud:
    image: nextcloud:33
    container_name: nextcloud
    restart: unless-stopped
    env_file: nextcloud.env
    environment:
      TZ: ${TZ}
      PUID: ${PUID}
      PGID: ${PGID}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_HOST_PASSWORD: ${REDIS_HOST_PASSWORD}
      REDIS_LOGLEVEL: ${REDIS_LOGLEVEL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data:/var/www/html/data
      - ./config:/var/www/html/config
      - ./custom_apps:/var/www/html/custom_apps
    networks:
      swag:
      nextcloud:
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/status.php >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    labels:
      swag: enable
      swag_port: 80
      swag_proto: http
      # blos keine custom_directives die machen nur alles kaputt das hier oben funktioniert!! er braucht 80 weil er per default 443 nimmt und dann n gescheites cert will was ja nich geht und kein sinn ergibt!!
      swag.uptime-kuma.enabled: true
      swag.uptime-kuma.monitor.url: http://nextcloud:80/
    logging:
      options:
        max-size: "200K"
        max-file: "10"

  postgres:
    image: dhi.io/postgres:18-alpine3.22
    container_name: nextcloud_postgres
    restart: unless-stopped
    env_file: nextcloud.env
    volumes:
      - ./postgres-data:/var/lib/postgresql
    networks:
      nextcloud:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      options:
        max-size: "200K"
        max-file: "10"

  redis:
    image: dhi.io/redis:8
    container_name: nextcloud_redis
    command: ["redis-server", "--requirepass", "${REDIS_HOST_PASSWORD}"]
    restart: unless-stopped
    env_file: nextcloud.env
    volumes:
      - ./redis:/data
    networks:
      nextcloud:
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_HOST_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      options:
        max-size: "200K"
        max-file: "10"

networks:
  swag:
    external: true
  nextcloud:
    name: nextcloud
