# dockerproxy
# 

# Provide limited access to the docker socket: https://github.com/linuxserver/docker-mods/tree/universal-docker; https://hub.docker.com/r/tecnativa/docker-socket-proxy 
services:
  dockerproxy:
    image: lscr.io/linuxserver/socket-proxy:latest
    container_name: dockerproxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: always
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      TZ: ${TZ}
      LOG_LEVEL: debug  # debug,info,notice,warning,err,crit,alert,emerg
      ## Granted by default
      EVENTS: 1
      PING: 1
      VERSION: 1
      ## Revoked by default / security-critical
      AUTH: 0
      SECRETS: 0
      POST: 1  # Watchtower needs POST access
      ## Not always needed
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      CONTAINERS: 1  # Traefik, Portainer etc.
      DISTRIBUTION: 0
      EXEC: 0
      IMAGES: 1  # Portainer
      INFO: 1  # Portainer
      NETWORKS: 1  # Portainer
      NODES: 1
      PLUGINS: 0
      SERVICES: 1  # Portainer
      SESSION: 0
      SWARM: 1
      SYSTEM: 0
      TASKS: 1  # Portainer
      VOLUMES: 1  # Portainer
    networks:
      dockerproxy:
    healthcheck:
      test: wget --spider http://localhost:2375/version || exit 1
      interval: "29s"
      timeout: "5s"
      retries: 3
      start_period: "21s"
    logging:
      options:
        max-size: "200K"
        max-file: "10"
        
networks:
  dockerproxy:
    external: true

